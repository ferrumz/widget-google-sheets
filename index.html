<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@400;600;700&subset=cyrillic&display=swap" rel="stylesheet">
  <style>
    body {
      background: transparent;
      font-family: 'Advent Pro', sans-serif;
      color: #fff;
      font-size: 20px;
      margin: 0;
      padding: 10px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 700;
      text-shadow: 2px 2px 4px #000;
      text-align: center;
    }
    ul { margin: 0; padding: 0; list-style: none; }
    li { padding: 3px 0; text-shadow: 1px 1px 3px #000; }
    .current { color: #4ade80; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Плейлист</h1>
  <ul id="list"></ul>
  <script>
    const params = new URLSearchParams(window.location.search);
    const ID = params.get('id') || 'РЕЗЕРВНЫЙ_ID';
    const SHEET = 'Лист1'; // имя вкладки
    const BASE = `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?tqx=out:json&sheet=${SHEET}&range=A:A&_=`;

    async function load() {
      try {
        const res = await fetch(BASE + Date.now());
        const txt = await res.text();
        const json = JSON.parse(txt.slice(47).slice(0, -2));
        const songs = json.table.rows.map(r => r.c[0]?.v || '').filter(Boolean);
        document.getElementById('list').innerHTML = songs
          .map((s, i) => `<li class="${i === 0 ? 'current' : ''}">${s}</li>`).join('');
      } catch(e) { console.warn(e); }
    }
    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
